# ==========================================
# APPLICATION
# ==========================================
spring.application.name=MedicalAppointmentSystem

# ==========================================
# DATABASE - SQL SERVER
# ==========================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=MedicalAppointmentSystem;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# THYMELEAF
# ==========================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ==========================================
# FILE UPLOAD
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=src/main/resources/static/uploads

# ==========================================
# SERVER
# ==========================================
server.port=8083
server.error.whitelabel.enabled=false

# ==========================================
# LOGGING
# ==========================================
logging.level.fpt.medical=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
