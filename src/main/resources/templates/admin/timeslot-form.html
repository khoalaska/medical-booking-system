<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin-layout}"
      th:with="activeMenu='schedules'">
<head>
    <title th:text="${pageTitle}">Thêm/Sửa Khung giờ</title>
</head>
<body>

<main class="page-content" layout:fragment="content">
    <div class="card" style="max-width: 600px; margin: 0 auto; padding: 20px;">
        
        <!-- Context Info Box -->
        <div class="context-box" style="background-color: #f8f9fa; border: 1px solid #e3e6f0; border-radius: 4px; padding: 15px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px;">
            <div>
                <span style="color: #666; font-size: 12px; display: block;">Bác sĩ</span>
                <strong style="font-size: 14px;" th:text="${schedule.doctor.user.fullName}">Tên bác sĩ</strong>
            </div>
            <div>
                <span style="color: #666; font-size: 12px; display: block;">Ngày làm việc</span>
                <strong style="font-size: 14px;" th:text="${#temporals.format(schedule.workDate, 'dd/MM/yyyy')}">20/07/2026</strong>
            </div>
            <div>
                <span style="color: #666; font-size: 12px; display: block;">Ca làm việc</span>
                <strong style="font-size: 14px;">
                    <span th:switch="${schedule.shift.name()}">
                        <span th:case="'MORNING'">Ca sáng</span>
                        <span th:case="'AFTERNOON'">Ca chiều</span>
                        <span th:case="'EVENING'">Ca tối</span>
                        <span th:case="*">Chưa rõ</span>
                    </span>
                </strong>
            </div>
        </div>

        <h2 th:text="${pageTitle}" style="margin-bottom: 20px;">Thêm/Sửa Khung giờ</h2>

        <!-- Error Message Alert -->
        <div th:if="${errorMessage != null}" class="alert alert-danger" th:text="${errorMessage}" style="margin-bottom: 20px; color: red;">
            Đã xảy ra lỗi.
        </div>

        <form th:action="@{/admin/schedules/{id}/timeslots/save(id=${scheduleId})}" th:object="${timeSlot}" method="post">
            <!-- Hidden Fields -->
            <input type="hidden" th:field="*{id}" />

            <!-- Start Time -->
            <div class="form-group" style="margin-bottom: 15px;">
                <label for="startTime" style="display: block; font-weight: bold; margin-bottom: 5px;">Giờ bắt đầu *</label>
                <input type="time" id="startTime" th:field="*{startTime}" class="form-control" style="width: 100%; padding: 8px; box-sizing: border-box;" required />
                <span th:if="${#fields.hasErrors('startTime')}" th:errors="*{startTime}" class="text-danger" style="color: red; font-size: 13px; display: block; margin-top: 5px;">
                    Lỗi giờ bắt đầu
                </span>
            </div>

            <!-- End Time -->
            <div class="form-group" style="margin-bottom: 15px;">
                <label for="endTime" style="display: block; font-weight: bold; margin-bottom: 5px;">Giờ kết thúc *</label>
                <input type="time" id="endTime" th:field="*{endTime}" class="form-control" style="width: 100%; padding: 8px; box-sizing: border-box;" required />
                <span th:if="${#fields.hasErrors('endTime')}" th:errors="*{endTime}" class="text-danger" style="color: red; font-size: 13px; display: block; margin-top: 5px;">
                    Lỗi giờ kết thúc
                </span>
            </div>

            <!-- Max Capacity -->
            <div class="form-group" style="margin-bottom: 15px;">
                <label for="maxCapacity" style="display: block; font-weight: bold; margin-bottom: 5px;">Sức chứa tối đa *</label>
                <input type="number" id="maxCapacity" th:field="*{maxCapacity}" class="form-control" style="width: 100%; padding: 8px; box-sizing: border-box;" min="1" required />
                <span th:if="${#fields.hasErrors('maxCapacity')}" th:errors="*{maxCapacity}" class="text-danger" style="color: red; font-size: 13px; display: block; margin-top: 5px;">
                    Lỗi sức chứa tối đa
                </span>
            </div>

            <!-- Status -->
            <div class="form-group" style="margin-bottom: 20px;">
                <label for="status" style="display: block; font-weight: bold; margin-bottom: 5px;">Trạng thái</label>
                <select id="status" th:field="*{status}" class="form-control" style="width: 100%; padding: 8px; box-sizing: border-box;" required>
                    <option value="AVAILABLE">Còn nhận đặt lịch</option>
                    <option value="CLOSED">Đã đóng (không nhận thêm)</option>
                </select>
            </div>

            <!-- Buttons -->
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn btn-primary">Lưu</button>
                <a th:href="@{/admin/schedules/{id}/timeslots(id=${scheduleId})}" class="btn btn-secondary" style="padding: 8px 12px; border: 1px solid #ccc; text-decoration: none; border-radius: 4px; display: inline-block; color: inherit; box-sizing: border-box;">Hủy</a>
            </div>
        </form>
    </div>
</main>

</body>
</html>
