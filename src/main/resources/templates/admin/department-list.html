<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/admin-layout}" th:with="activeMenu='departments'">

<head>
    <title>Quản lý Phòng ban</title>
</head>

<body>

    <main class="page-content" layout:fragment="content">
        <div class="card">
            <div class="card-header"
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Quản lý Phòng ban</h2>
                <a th:href="@{/admin/departments/new}" class="btn btn-primary">Thêm mới phòng ban</a>
            </div>

            <!-- Success Message -->
            <div th:if="${successMessage != null}" class="alert alert-success" th:text="${successMessage}">
                Thao tác thành công.
            </div>

            <!-- Error Message -->
            <div th:if="${errorMessage != null}" class="alert alert-danger" th:text="${errorMessage}">
                Đã xảy ra lỗi.
            </div>

            <!-- Search Bar -->
            <div class="search-box" style="margin-bottom: 20px;">
                <form th:action="@{/admin/departments}" method="get" style="display: flex; gap: 10px;">
                    <input type="hidden" name="sortBy" th:value="${sortBy}" />
                    <input type="hidden" name="sortDir" th:value="${sortDir}" />

                    <input type="text" name="keyword" th:value="${keyword}" class="form-control"
                        placeholder="Tìm kiếm theo tên..." style="flex: 1; padding: 8px;" />
                    <button type="submit" class="btn btn-primary">Tìm kiếm</button>
                    <a th:href="@{/admin/departments}" class="btn btn-secondary"
                        style="padding: 8px 12px; border: 1px solid #ccc; text-decoration: none; border-radius: 4px; display: inline-block;">Làm
                        mới</a>
                </form>
            </div>

            <!-- Department Table -->
            <div class="table-responsive">
                <table class="table" style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                    <thead>
                        <tr style="border-bottom: 2px solid #ddd; text-align: left;">
                            <th style="padding: 10px;">
                                <a th:href="@{/admin/departments(keyword=${keyword}, sortBy='id', sortDir=${reverseSortDir})}"
                                    style="text-decoration: none; color: inherit; font-weight: bold;">
                                    ID <span th:if="${sortBy == 'id'}" th:text="${sortDir == 'asc' ? '▲' : '▼'}"></span>
                                </a>
                            </th>
                            <th style="padding: 10px;">Ảnh</th>
                            <th style="padding: 10px;">
                                <a th:href="@{/admin/departments(keyword=${keyword}, sortBy='name', sortDir=${reverseSortDir})}"
                                    style="text-decoration: none; color: inherit; font-weight: bold;">
                                    Tên phòng ban <span th:if="${sortBy == 'name'}"
                                        th:text="${sortDir == 'asc' ? '▲' : '▼'}"></span>
                                </a>
                            </th>
                            <th style="padding: 10px;">Mô tả</th>
                            <th style="padding: 10px;">Số bác sĩ</th>
                            <th style="padding: 10px; text-align: center;">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(departments)}">
                            <td colspan="6" style="text-align: center; padding: 20px; color: #777;">Không có phòng ban
                                nào</td>
                        </tr>
                        <tr th:each="dept : ${departments}" style="border-bottom: 1px solid #eee;">
                            <td style="padding: 10px;" th:text="${dept.id}">1</td>
                            <td style="padding: 10px;">
                                <img th:if="${dept.imageUrl != null && !#strings.isEmpty(dept.imageUrl)}"
                                    th:src="${dept.imageUrl}" alt="Department Image"
                                    style="width: 50px; height: 50px; object-fit: cover; border-radius: 4px;" />
                                <div th:unless="${dept.imageUrl != null && !#strings.isEmpty(dept.imageUrl)}"
                                    style="width: 50px; height: 50px; background-color: #eee; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #777; border-radius: 4px;">
                                    No Image
                                </div>
                            </td>
                            <td style="padding: 10px; font-weight: bold;" th:text="${dept.name}">Tên phòng ban</td>
                            <td style="padding: 10px;"
                                th:text="${dept.description != null && #strings.length(dept.description) > 100} ? ${#strings.substring(dept.description,0,100)} + '...' : ${dept.description}">
                                Mô tả phòng ban</td>
                            <td style="padding: 10px;" th:text="${dept.doctors.size()}">0</td>
                            <td
                                style="padding: 10px; text-align: center; display: flex; gap: 10px; justify-content: center; align-items: center;">
                                <a th:href="@{/admin/departments/edit/{id}(id=${dept.id})}" class="btn btn-secondary"
                                    style="font-size: 13px; text-decoration: none; padding: 5px 10px; border-radius: 4px;">Sửa</a>
                                <a th:href="@{/admin/departments/delete/{id}(id=${dept.id})}" class="btn btn-danger"
                                    style="font-size: 13px; text-decoration: none; padding: 5px 10px; border-radius: 4px;"
                                    onclick="return confirm('Bạn có chắc chắn muốn xóa phòng ban này?')">Xóa</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination & Summary Info -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                <div>
                    Tổng số bản ghi: <strong th:text="${totalItems}">0</strong>
                </div>

                <div class="pagination-wrapper" th:if="${totalPages > 1}">
                    <ul class="pagination" style="display: flex; list-style: none; gap: 5px; padding: 0; margin: 0;">
                        <!-- Previous Page -->
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link"
                                th:href="${currentPage == 0} ? '#' : @{/admin/departments(page=${currentPage - 1}, keyword=${keyword}, sortBy=${sortBy}, sortDir=${sortDir})}"
                                th:onclick="${currentPage == 0} ? 'return false;' : null"
                                style="padding: 6px 12px; border: 1px solid #ccc; text-decoration: none; border-radius: 4px; color: inherit;">Trước</a>
                        </li>

                        <!-- Page Numbers -->
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                            th:classappend="${currentPage == i} ? 'active'">
                            <a class="page-link"
                                th:href="@{/admin/departments(page=${i}, keyword=${keyword}, sortBy=${sortBy}, sortDir=${sortDir})}"
                                th:text="${i + 1}"
                                th:style="${currentPage == i} ? 'padding: 6px 12px; border: 1px solid #007bff; background-color: #007bff; color: #fff; text-decoration: none; border-radius: 4px;' : 'padding: 6px 12px; border: 1px solid #ccc; text-decoration: none; border-radius: 4px; color: inherit;'">1</a>
                        </li>

                        <!-- Next Page -->
                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                            <a class="page-link"
                                th:href="${currentPage == totalPages - 1} ? '#' : @{/admin/departments(page=${currentPage + 1}, keyword=${keyword}, sortBy=${sortBy}, sortDir=${sortDir})}"
                                th:onclick="${currentPage == totalPages - 1} ? 'return false;' : null"
                                style="padding: 6px 12px; border: 1px solid #ccc; text-decoration: none; border-radius: 4px; color: inherit;">Sau</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
