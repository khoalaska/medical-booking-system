<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/auth-layout}">
<head>
    <title>Đăng nhập</title>
</head>
<body>

<div layout:fragment="content">

    <div class="auth-card">

        <!-- Bên trái: form đăng nhập -->
        <section class="auth-form-side">

            <div class="login-box">

                <h1>Đăng nhập</h1>

                <!-- Khi đăng nhập sai -->
                <div class="message error-message" th:if="${param.error}">
                    Số điện thoại hoặc mật khẩu không đúng
                </div>

                <!-- Khi logout -->
                <div class="message success-message" th:if="${param.logout}">
                    Bạn đã đăng xuất thành công
                </div>

                <!--
                    Form gửi tới /login.
                    Sau này SecurityConfig sẽ xử lý đường dẫn /login này.
                -->
                <form th:action="@{/login}" method="post">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">

                    <div class="form-group">
                        <label for="phone">Số điện thoại</label>
                        <input type="text"
                               id="phone"
                               name="phone"
                               placeholder="Nhập số điện thoại"
                               maxlength="20"
                               required
                               autocomplete="username">
                    </div>

                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <input type="password"
                               id="password"
                               name="password"
                               placeholder="Nhập mật khẩu"
                               maxlength="255"
                               required>
                    </div>

                    <div class="form-action">
                        <button type="submit">Đăng nhập</button>

                        <a th:href="@{/auth/forgot-password}">
                            Quên mật khẩu?
                        </a>
                    </div>

                </form>

                <div class="register-text">
                    Chưa có tài khoản?
                    <a th:href="@{/auth/register}">Đăng ký ngay</a>
                </div>

            </div>

        </section>

        <!-- Bên phải: ảnh nền -->
        <section class="auth-visual">

            <div class="visual-overlay"></div>


        </section>

    </div>

</div>

</body>
</html>
