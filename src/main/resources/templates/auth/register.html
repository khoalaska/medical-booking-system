<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/auth-layout}">
<head>
    <title>Đăng ký</title>
</head>
<body>

<div layout:fragment="content">

    <div class="register-wrapper">
        <div class="register-card">

            <h1>Đăng ký tài khoản</h1>

            <p class="register-subtitle">
                Vui lòng cung cấp thông tin để tham gia cùng chúng tôi.
            </p>

            <form th:action="@{/auth/register}"
                  th:object="${registerDTO}"
                  method="post">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="form-group">
                    <label for="fullName">Họ và tên</label>

                    <input type="text"
                           id="fullName"
                           th:field="*{fullName}"
                           placeholder="Nguyễn Văn An"
                           maxlength="255"
                           autocomplete="name">

                    <p class="field-error"
                       th:if="${#fields.hasErrors('fullName')}"
                       th:errors="*{fullName}">
                    </p>
                </div>

                <div class="form-group">
                    <label for="phone">Số điện thoại</label>

                    <input type="text"
                           id="phone"
                           th:field="*{phone}"
                           placeholder="0123 456 789"
                           maxlength="20"
                           autocomplete="username">

                    <p class="field-error"
                       th:if="${#fields.hasErrors('phone')}"
                       th:errors="*{phone}">
                    </p>
                </div>

                <div class="form-group">
                    <label for="password">
                        Mật khẩu
                        <span class="password-note">Gồm các số từ 0-9</span>
                    </label>

                    <input type="password"
                           id="password"
                           th:field="*{password}"
                           placeholder="Nhập mật khẩu"
                           inputmode="numeric"
                           maxlength="255"
                           autocomplete="new-password">

                    <p class="field-error"
                       th:if="${#fields.hasErrors('password')}"
                       th:errors="*{password}">
                    </p>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Nhập lại mật khẩu</label>

                    <input type="password"
                           id="confirmPassword"
                           th:field="*{confirmPassword}"
                           placeholder="Nhập lại mật khẩu"
                           inputmode="numeric"
                           maxlength="255"
                           autocomplete="new-password">

                    <p class="field-error"
                       th:if="${#fields.hasErrors('confirmPassword')}"
                       th:errors="*{confirmPassword}">
                    </p>
                </div>

                <button type="submit" class="register-button">
                    Đăng ký ngay
                </button>

            </form>

            <p class="login-text">
                Đã có tài khoản?
                <a th:href="@{/auth/login}">Đăng nhập</a>
            </p>

        </div>

    </div>

</div>

</body>
</html>
