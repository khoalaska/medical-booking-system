<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main-layout}"
      lang="vi">
<head>
    <title>Dashboard Bác sĩ</title>
</head>
<body>

<!-- Main content injected into the shared layout -->
<main class="page-content" layout:fragment="content">

    <h2>Chào mừng Bác sĩ <span th:text="${doctorName}">Nguyễn Văn A</span></h2>

    <!-- Overview stat cards: a quick glance at today's numbers -->
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 16px;">
        <div class="card">
            <p class="text-muted">Lịch hẹn hôm nay</p>
            <h3 th:text="${todayAppointments}">0</h3>
        </div>
        <div class="card">
            <p class="text-muted">Bệnh nhân chờ khám</p>
            <h3 th:text="${pendingPatients}">0</h3>
        </div>
        <div class="card">
            <p class="text-muted">Đã khám hôm nay</p>
            <h3 th:text="${completedToday}">0</h3>
        </div>
    </div>

    <!-- Quick preview of the next patients today.
         The full working list with date picker and "Khám" buttons lives on the Schedule screen. -->
    <div class="card mt-4">
        <div class="card-header">
            <h4 class="card-title">Bệnh nhân sắp tới hôm nay</h4>
        </div>
        <table class="data-table">
            <thead>
            <tr>
                <th>Giờ hẹn</th>
                <th>Bệnh nhân</th>
                <th>Trạng thái</th>
            </tr>
            </thead>
            <tbody>
            <!-- Show only the first 5 appointments as a short preview -->
            <tr th:each="appointment, iterationStatus : ${appointments}" th:if="${iterationStatus.index < 5}">

                <!-- Appointment start time -->
                <td th:text="${#temporals.format(appointment.timeSlot.startTime, 'HH:mm')}">09:00</td>

                <!-- Patient full name -->
                <td th:text="${appointment.patient.user.fullName}">Nguyễn Văn A</td>

                <!-- Map the appointment status to a Vietnamese label and a colored badge -->
                <td th:switch="${appointment.status.name()}">
                    <span th:case="'PENDING'" class="badge badge-warning">Chờ xác nhận</span>
                    <span th:case="'CONFIRMED'" class="badge badge-info">Đã xác nhận</span>
                    <span th:case="'COMPLETED'" class="badge badge-success">Đã khám</span>
                    <span th:case="'CANCELLED'" class="badge badge-danger">Đã hủy</span>
                </td>
            </tr>

            <!-- Empty state when there is no appointment today -->
            <tr th:if="${appointments == null or #lists.isEmpty(appointments)}">
                <td colspan="3" class="text-center text-muted">Chưa có lịch hẹn hôm nay</td>
            </tr>
            </tbody>
        </table>
    </div>

</main>

</body>
</html>
