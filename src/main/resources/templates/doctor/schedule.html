<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main-layout}"
      lang="vi">
<head>
    <title>Lịch khám</title>
    <!-- CSS riêng của module bác sĩ -->
    <link rel="stylesheet" th:href="@{/css/doctor.css}">
</head>
<body>

<!-- Main content injected into the shared layout -->
<main class="page-content" layout:fragment="content">

    <h2>Lịch khám</h2>

    <!-- One card holds the toolbar (title + filter) and the appointment table together -->
    <div class="card mt-4">

        <!-- Toolbar: title with the appointment count on the left, the filter form on the right.
             flex-wrap lets the filter drop to a new line on small screens. -->
        <div class="card-header toolbar">
            <h4 class="card-title">
                Lịch hẹn ngày
                <span th:text="${#temporals.format(selectedDate, 'dd/MM/yyyy')}">01/01/2025</span>
                <span class="text-muted title-count">
                    (<span th:text="${#lists.size(appointments)}">0</span> lịch hẹn)
                </span>
            </h4>

            <!-- Filter: pick a date and a status, then submit by GET so both stay in the URL -->
            <form method="get" th:action="@{/doctor/schedule}" class="filter-form">

                <div class="form-group filter-field">
                    <label class="form-label">Ngày khám</label>
                    <input type="date" name="date" class="form-control" th:value="${selectedDate}">
                </div>

                <div class="form-group filter-field">
                    <label class="form-label">Trạng thái</label>
                    <!-- The chosen status stays selected after submitting -->
                    <select name="status" class="form-select">
                        <option value="" th:selected="${selectedStatus == null or selectedStatus == ''}">Tất cả</option>
                        <option value="PENDING" th:selected="${selectedStatus == 'PENDING'}">Chờ xác nhận</option>
                        <option value="CONFIRMED" th:selected="${selectedStatus == 'CONFIRMED'}">Đã xác nhận</option>
                        <option value="COMPLETED" th:selected="${selectedStatus == 'COMPLETED'}">Đã khám</option>
                        <option value="CANCELLED" th:selected="${selectedStatus == 'CANCELLED'}">Đã hủy</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary">Lọc</button>
            </form>
        </div>

        <table class="data-table">
            <thead>
            <tr>
                <th>Giờ khám</th>
                <th>Bệnh nhân</th>
                <th>Lý do khám</th>
                <th>Trạng thái</th>
                <!-- col-action (doctor.css) right-aligns this header so it lines up
                     with the right-aligned action buttons below -->
                <th class="col-action">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <!-- Render one row for each appointment of the day.
                 Each status has its own action: pending -> confirm, confirmed -> examine, completed -> view/edit. -->
            <tr th:each="appointment : ${appointments}"
                th:with="isPending=${appointment.status.name() == 'PENDING'},
                         isConfirmed=${appointment.status.name() == 'CONFIRMED'},
                         isCompleted=${appointment.status.name() == 'COMPLETED'}">

                <!-- Time range of the booked slot -->
                <td>
                    <span th:text="${#temporals.format(appointment.timeSlot.startTime, 'HH:mm')}">08:00</span>
                    -
                    <span th:text="${#temporals.format(appointment.timeSlot.endTime, 'HH:mm')}">09:00</span>
                </td>

                <!-- Patient full name -->
                <td>
                    <!-- The name links to the diagnosis screen only after the appointment is confirmed -->
                    <a th:if="${isConfirmed or isCompleted}"
                       th:href="@{/doctor/diagnosis/{id}(id=${appointment.id})}"
                       th:text="${appointment.patient.user.fullName}">Nguyễn Văn A</a>
                    <!-- Still waiting for confirmation, or cancelled: show plain text -->
                    <span th:unless="${isConfirmed or isCompleted}" th:text="${appointment.patient.user.fullName}">Nguyễn Văn A</span>
                </td>

                <!-- Reason for visit -->
                <td>
                    <!-- Show the patient's note when it exists -->
                    <span th:if="${appointment.notes != null}" th:text="${appointment.notes}">Khám tổng quát</span>
                    <!-- Show a placeholder when the patient did not write any note -->
                    <span th:unless="${appointment.notes != null}">Không có ghi chú</span>
                </td>

                <!-- Map the appointment status to a Vietnamese label and a colored badge -->
                <td th:switch="${appointment.status.name()}">
                    <span th:case="'PENDING'" class="badge badge-warning">Chờ xác nhận</span>
                    <span th:case="'CONFIRMED'" class="badge badge-info">Đã xác nhận</span>
                    <span th:case="'COMPLETED'" class="badge badge-success">Đã khám</span>
                    <span th:case="'CANCELLED'" class="badge badge-danger">Đã hủy</span>
                </td>

                <!-- Action column: one action per status.
                     A flex wrapper right-aligns the button so the form-wrapped button and the link
                     buttons all sit on the same right edge (btn-action keeps them the same width). -->
                <td>
                    <div class="action-cell">
                        <!-- Pending: the doctor confirms the appointment first (POST changes data) -->
                        <form th:if="${isPending}" method="post"
                              th:action="@{/doctor/schedule/confirm/{id}(id=${appointment.id})}">
                            <button type="submit" class="btn btn-info btn-sm btn-action">Xác nhận</button>
                        </form>
                        <!-- Confirmed: the doctor examines the patient -->
                        <a th:if="${isConfirmed}"
                           th:href="@{/doctor/diagnosis/{id}(id=${appointment.id})}"
                           class="btn btn-primary btn-sm btn-action">Khám</a>
                        <!-- Completed: view or edit the saved record -->
                        <a th:if="${isCompleted}"
                           th:href="@{/doctor/diagnosis/{id}(id=${appointment.id})}"
                           class="btn btn-outline btn-sm btn-action">Xem / Sửa</a>
                    </div>
                </td>
            </tr>

            <!-- Empty state when there is no appointment on the selected date -->
            <tr th:if="${appointments == null or #lists.isEmpty(appointments)}">
                <td colspan="5" class="text-center text-muted">Chưa có lịch hẹn trong ngày này</td>
            </tr>
            </tbody>
        </table>
    </div>

</main>

</body>
</html>
