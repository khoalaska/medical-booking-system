<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/public-layout}">

<head>
    <title>Hồ sơ cá nhân</title>
</head>

<body>

<main layout:fragment="content">

    <section class="profile-page">

        <div class="profile-container">

            <div class="profile-card">

                <h1>Hồ sơ cá nhân</h1>

                <p class="profile-subtitle">
                    Xem và cập nhật thông tin tài khoản
                </p>

                <div class="profile-success"
                     th:if="${successMessage}"
                     th:text="${successMessage}">
                </div>

                <form th:action="@{/patients/profile}"
                      th:object="${userProfileDTO}"
                      method="post">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">

                    <div class="profile-global-error"
                         th:if="${#fields.hasGlobalErrors()}">

                        <p th:each="error : ${#fields.globalErrors()}"
                           th:text="${error}">
                        </p>

                    </div>

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">

                    <div class="profile-form-group">

                        <label for="fullName">
                            Họ và tên
                        </label>

                        <input type="text"
                               id="fullName"
                               th:field="*{fullName}"
                               maxlength="255"
                               placeholder="Nhập họ và tên">

                        <p class="profile-field-error"
                           th:if="${#fields.hasErrors('fullName')}"
                           th:errors="*{fullName}">
                        </p>

                    </div>

                    <div class="profile-form-group">

                        <label for="phone">
                            Số điện thoại
                        </label>

                        <input type="text"
                               id="phone"
                               th:field="*{phone}"
                               maxlength="10"
                               placeholder="Nhập số điện thoại">

                        <p class="profile-field-error"
                           th:if="${#fields.hasErrors('phone')}"
                           th:errors="*{phone}">
                        </p>

                    </div>

                    <div class="profile-form-group">

                        <label for="email">
                            Email
                        </label>

                        <input type="email"
                               id="email"
                               th:field="*{email}"
                               maxlength="255"
                               placeholder="example@gmail.com">

                        <p class="profile-field-error"
                           th:if="${#fields.hasErrors('email')}"
                           th:errors="*{email}">
                        </p>

                    </div>

                    <div class="profile-actions">


                        <button type="submit"
                                class="profile-save-button">
                            Lưu thay đổi
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </section>

</main>

</body>
</html>
